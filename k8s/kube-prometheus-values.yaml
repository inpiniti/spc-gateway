fullnameOverride: spc-monitoring

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin1234
  service:
    type: NodePort
    nodePort: 32300
  persistence:
    enabled: false

prometheus:
  service:
    type: NodePort
    nodePort: 32090
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi
    storageSpec: {}

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

defaultRules:
  create: true
